<html></html>
 <head>
  <title>
   Leovi Garcia
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
   body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
        }
        .profile-pic {
            width: 10rem;
            height: auto;
            background-color: var(--dark);
            border-radius: 50%;
            display: inline;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }
        .intro {
            font-size: 18px;
            margin-top: 20px;
        }
        .intro p {
            margin: 5px 0;
        }
        .button {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .button:hover {
            background-color: #333333;
        }
        .skills {
            margin-top: 20px;
        }
        .skills img {
            width: 50px;
            margin: 0 10px;
        }
        .construction {
            width: 200px;
            height: 200px;
            background-color: #333333;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            position: relative;
        }
        .construction::before {
            content: "UNDER CONSTRUCTION";
            transform: rotate(-45deg);
            position: absolute;
            font-size: 18px;
        }
  </style>
 </head>
 <body>
  <div class="container">
   <div class="profile-pic">
    <img alt="profile" height="50" src="pogi.jpg" width="50"/>
   </div>
   <div class="name">
    Leovi Garcia
   </div>
   <div class="intro">
    <p>
     Intro
    </p>
    <p>
     Hello, I'm an aspiring full-stack developer
    </p>
    <button class="button">
     Hire Me
    </button>
    <p>
     Went to Mangaldan National High School
    </p>
    <p>
     Live in Mangaldan, Pangasinan
    </p>
   </div>
   <div class="skills">
    <img alt="HTML5 logo" height="50" src="html5.png" width="150"/>
    <img alt="CSS3 logo" height="50" src="OIP.jpg" width="150"/>
    <img alt="JavaScript logo" height="50" src="19224697601_6b600f21eb.jpg" width="50"/>
   </div>
   <div class="construction">
   </div>
  </div>
 </body>
</html>
